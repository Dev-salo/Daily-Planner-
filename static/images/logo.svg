<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0d6efd" opacity="0.1"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#0d6efd" stroke-width="2"/>
  
  <!-- Calendar icon -->
  <rect x="50" y="50" width="100" height="100" rx="8" fill="none" stroke="#0d6efd" stroke-width="3"/>
  
  <!-- Calendar header bar -->
  <rect x="50" y="50" width="100" height="25" rx="8" fill="#0d6efd"/>
  <line x1="50" y1="75" x2="150" y2="75" stroke="#0d6efd" stroke-width="2"/>
  
  <!-- Calendar grid -->
  <line x1="75" y1="75" x2="75" y2="150" stroke="#0d6efd" stroke-width="1.5"/>
  <line x1="100" y1="75" x2="100" y2="150" stroke="#0d6efd" stroke-width="1.5"/>
  <line x1="125" y1="75" x2="125" y2="150" stroke="#0d6efd" stroke-width="1.5"/>
  
  <line x1="50" y1="100" x2="150" y2="100" stroke="#0d6efd" stroke-width="1.5"/>
  <line x1="50" y1="125" x2="150" y2="125" stroke="#0d6efd" stroke-width="1.5"/>
  
  <!-- Checkmark inside -->
  <path d="M 85 105 L 95 115 L 115 95" stroke="#28a745" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Animated ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#0d6efd" stroke-width="2" opacity="0.5" stroke-dasharray="300" stroke-dashoffset="300">
    <animate attributeName="stroke-dashoffset" from="300" to="0" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>