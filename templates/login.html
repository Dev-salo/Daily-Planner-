{% extends "base.html" %}

{% block title %}Login - Daily Planner System{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="auth-card" data-aos="fade-up">
                    <div class="text-center mb-4">
                        <i class="bi bi-box-arrow-in-right display-4 text-primary"></i>
                        <h2 class="mt-3">Welcome Back!</h2>
                        <p class="text-muted">Sign in to continue to your planner</p>
                    </div>
                    
                    <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control" id="email" name="email" required autofocus>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="password" name="password" required>
                                <button type="button" class="btn btn-outline-secondary password-toggle" onclick="togglePassword(this)">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                            <label class="form-check-label" for="remember">Remember me</label>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="bi bi-box-arrow-in-right"></i> Sign In
                        </button>
                        
                        <div class="text-center">
                            <p class="mb-0">Don't have an account? 
                                <a href="{{ url_for('auth.register') }}" class="text-primary">Sign Up</a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function togglePassword(button) {
    const input = button.previousElementSibling;
    const icon = button.querySelector('i');
    
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
        button.classList.add('active');
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
        button.classList.remove('active');
    }
}
</script>

<style>
.password-toggle {
    border-left: none;
    padding: 0.375rem 0.75rem;
    transition: all 0.3s ease;
}

.password-toggle:hover {
    background-color: #e9ecef;
    color: #0d6efd;
}

.password-toggle.active {
    color: #0d6efd;
}

[data-theme="dark"] .password-toggle:hover {
    background-color: #3d444d;
}
</style>
{% endblock %}
