{% extends "base.html" %}

{% block title %}Settings - Daily Planner System{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-4">
    <div class="row">
        <div class="col-md-12">
            <div class="card shadow-sm" data-aos="fade-up">
                <h2 class="section-header">Settings & Preferences</h2>
                <div class="card-body p-4">
                    <div class="row g-4">
                        <!-- PROFILE SECTION -->
                        <div class="col-md-12">
                            <h4 class="mb-3"><i class="bi bi-person"></i> Profile Settings</h4>
                        </div>

                        <div class="col-md-6">
                            <div class="card border">
                                <div class="card-body">
                                    <label class="form-label">Username</label>
                                    <div class="input-group">
                                        <input type="text" class="form-control" id="newUsername" value="{{ current_user.name }}">
                                        <button class="btn btn-primary" type="button" id="updateUsernameBtn">Update</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="card border">
                                <div class="card-body">
                                    <label class="form-label">Email Address</label>
                                    <div class="input-group">
                                        <input type="email" class="form-control" id="newEmail" value="{{ current_user.email }}">
                                        <button class="btn btn-primary" type="button" id="updateEmailBtn">Update</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="card border">
                                <div class="card-body">
                                    <label class="form-label">Timezone</label>
                                    <select class="form-select" id="timezoneSelect">
                                        {% for tz in timezones %}
                                        <option value="{{ tz }}" {% if tz == current_tz %}selected{% endif %}>{{ tz }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- APPEARANCE SECTION -->
                        <div class="col-md-12">
                            <h4 class="mb-3 mt-4"><i class="bi bi-palette"></i> Appearance Settings</h4>
                        </div>

                        <div class="col-md-6">
                            <div class="card border">
                                <div class="card-body">
                                    <h5 class="mb-3">Theme</h5>
                                    <div class="d-flex gap-2">
                                        <button class="btn btn-outline-primary flex-fill" id="lightThemeBtn">
                                            ☀️ Light
                                        </button>
                                        <button class="btn btn-outline-primary flex-fill" id="darkThemeBtn">
                                            🌙 Dark
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="card border">
                                <div class="card-body">
                                    <h5 class="mb-3">Display Mode</h5>
                                    <div class="d-flex gap-2">
                                        <button class="btn btn-outline-primary flex-fill" id="compactViewBtn">
                                            Compact
                                        </button>
                                        <button class="btn btn-outline-primary flex-fill" id="expandedViewBtn">
                                            Expanded
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="card border">
                                <div class="card-body">
                                    <h5 class="mb-3">Calendar View</h5>
                                    <select class="form-select" id="calendarViewSelect">
                                        <option value="day" {% if calendar_view == 'day' %}selected{% endif %}>Day View</option>
                                        <option value="week" {% if calendar_view == 'week' %}selected{% endif %}>Weekly View</option>
                                        <option value="month" {% if calendar_view == 'month' %}selected{% endif %}>Month View</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- PASSWORD SECTION -->
                        <div class="col-md-12">
                            <h4 class="mb-3 mt-4"><i class="bi bi-shield-lock"></i> Security</h4>
                        </div>

                        <div class="col-md-12">
                            <div class="card border">
                                <div class="card-body">
                                    <form id="passwordChangeForm">
                                        <div class="row g-3">
                                            <div class="col-md-4">
                                                <label class="form-label">Current Password</label>
                                                <input type="password" class="form-control" id="currentPassword" required>
                                            </div>
                                            <div class="col-md-4">
                                                <label class="form-label">New Password</label>
                                                <input type="password" class="form-control" id="newPassword" required>
                                            </div>
                                            <div class="col-md-4">
                                                <label class="form-label">Confirm Password</label>
                                                <input type="password" class="form-control" id="confirmPassword" required>
                                            </div>
                                            <div class="col-12">
                                                <button type="submit" class="btn btn-primary mt-2">Update Password</button>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-12">
                            <hr class="my-4">
                            <a href="/logout" class="btn btn-outline-secondary">
                                Logout
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.settings-tab-btn {
    padding: 0.75rem 1rem;
    border: none;
    background: none;
    cursor: pointer;
    font-weight: 600;
    color: #6c757d;
    border-bottom: 3px solid transparent;
    transition: all 0.3s ease;
}

.settings-tab-btn:hover {
    color: #0d6efd;
    background-color: rgba(13, 110, 253, 0.05);
}

.settings-tab-btn.active {
    color: #0d6efd;
    border-bottom-color: #0d6efd;
}

.settings-tab-content {
    display: none;
    animation: fadeIn 0.3s ease;
}

.settings-tab-content.active {
    display: block;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

[data-theme="dark"] .settings-tab-btn {
    color: #adb5bd;
}

[data-theme="dark"] .settings-tab-btn:hover,
[data-theme="dark"] .settings-tab-btn.active {
    color: #3a86ff;
}
</style>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/simplified-settings.js') }}?v={{ cache_buster }}"></script>
{% endblock %}
