{% extends "base.html" %}

{% block title %}Calendar - Daily Planner System{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-4">
    <div class="row">
        <div class="col-md-12" data-aos="fade-up">
            <div class="card shadow-sm">
                <h2 class="section-header">Task Calendar</h2>
                <div class="card-body p-4">
                    <div id="calendar"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="taskDetailModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="taskDetailTitle"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="taskDetailBody"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const calendarEl = document.getElementById('calendar');
    
    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },
        events: '/tasks/api',
        eventClick: function(info) {
            document.getElementById('taskDetailTitle').textContent = info.event.title;
            
            const description = info.event.extendedProps.description || 'No description';
            const frequency = info.event.extendedProps.frequency || 'N/A';
            const status = info.event.extendedProps.status || 'incomplete';
            
            document.getElementById('taskDetailBody').innerHTML = `
                <p><strong>Description:</strong> ${description}</p>
                <p><strong>Frequency:</strong> <span class="badge bg-primary">${frequency}</span></p>
                <p><strong>Status:</strong> <span class="badge bg-${status === 'complete' ? 'success' : 'warning'}">${status}</span></p>
                <p><strong>Date:</strong> ${info.event.start.toLocaleDateString()}</p>
            `;
            
            new bootstrap.Modal(document.getElementById('taskDetailModal')).show();
        },
        dateClick: function(info) {
            window.location.href = '/tasks';
        }
    });
    
    calendar.render();
});
</script>
{% endblock %}
