{% extends "base.html" %}

{% block title %}Calendar - Daily Planner System{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-4">
    <div class="row">
        <div class="col-md-12" data-aos="fade-up">
            <div class="card shadow-sm">
                <h2 class="section-header">Task Calendar</h2>
                <div class="card-body p-4">
                    <div id="calendar"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="addTaskModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content minimalist-modal">
            <div class="modal-header border-0 pb-0">
                <h4 class="modal-title fw-bold">New Task</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST" action="{{ url_for('tasks.add_task') }}">
                <div class="modal-body pt-2">
                    <div class="minimalist-input-group mb-4">
                        <input type="text" class="minimalist-input form-control fs-5" id="taskName" name="name" placeholder="What needs to be done?" required>
                    </div>
                    <div class="minimalist-input-group mb-4">
                        <textarea class="minimalist-input form-control text-muted" id="taskDescription" name="description" rows="2" placeholder="Add details..."></textarea>
                    </div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <div class="minimalist-input-box p-3 rounded-3 bg-light">
                                <label for="taskDate" class="text-uppercase text-muted" style="font-size: 0.75rem; font-weight: 600; letter-spacing: 0.5px;">Date</label>
                                <input type="date" class="minimalist-input form-control p-0 bg-transparent border-0 fw-medium" id="taskDate" name="date" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="minimalist-input-box p-3 rounded-3 bg-light">
                                <label for="taskTime" class="text-uppercase text-muted" style="font-size: 0.75rem; font-weight: 600; letter-spacing: 0.5px;">Time</label>
                                <input type="time" class="minimalist-input form-control p-0 bg-transparent border-0 fw-medium" id="taskTime" name="time">
                            </div>
                        </div>
                    </div>
                    <div class="minimalist-input-box p-3 rounded-3 bg-light mb-3">
                        <label for="taskFrequency" class="text-uppercase text-muted mb-1" style="font-size: 0.75rem; font-weight: 600; letter-spacing: 0.5px;">Repeat</label>
                        <select class="minimalist-input form-select p-0 bg-transparent border-0 fw-medium shadow-none cursor-pointer" id="taskFrequency" name="frequency" required>
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold text-uppercase" style="letter-spacing: 0.5px;">Create Task</button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
/* Minimalist Modal Styling */
.minimalist-modal {
    border: none;
    border-radius: 16px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    overflow: hidden;
}

[data-theme="dark"] .minimalist-modal {
    background-color: #21252b;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

.minimalist-input {
    border: none !important;
    box-shadow: none !important;
    padding-left: 0 !important;
    padding-right: 0 !important;
    background: transparent !important;
}

.minimalist-input:focus {
    box-shadow: none !important;
    background: transparent !important;
}

.minimalist-input-group .minimalist-input {
    border-bottom: 2px solid transparent !important;
    border-radius: 0;
    transition: border-color 0.3s ease;
}

.minimalist-input-group .minimalist-input:focus {
    border-bottom-color: var(--primary-color) !important;
}

[data-theme="dark"] .minimalist-input-box.bg-light {
    background-color: #2c313a !important;
}

[data-theme="dark"] .minimalist-input {
    color: #e1e4e8 !important;
}

/* Fix input type date/time indicator colors in dark mode */
[data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator,
[data-theme="dark"] input[type="time"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
}
</style>

<div class="modal fade" id="taskDetailModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="taskDetailTitle"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="taskDetailBody"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const calendarEl = document.getElementById('calendar');
    
    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },
        events: '/tasks/api',
        eventClick: function(info) {
            document.getElementById('taskDetailTitle').textContent = info.event.title;
            
            const description = info.event.extendedProps.description || 'No description';
            const frequency = info.event.extendedProps.frequency || 'N/A';
            const status = info.event.extendedProps.status || 'incomplete';
            
            document.getElementById('taskDetailBody').innerHTML = `
                <p><strong>Description:</strong> ${description}</p>
                <p><strong>Frequency:</strong> <span class="badge bg-primary">${frequency}</span></p>
                <p><strong>Status:</strong> <span class="badge bg-${status === 'complete' ? 'success' : 'warning'}">${status}</span></p>
                <p><strong>Date:</strong> ${info.event.start.toLocaleDateString()}</p>
            `;
            
            new bootstrap.Modal(document.getElementById('taskDetailModal')).show();
        },
        dateClick: function(info) {
            const clickedDate = info.dateStr;
            const today = new Date().toISOString().split('T')[0];
            
            if (clickedDate < today) {
                // Create an elegant toast message
                const toast = document.createElement('div');
                toast.textContent = 'You cannot schedule a new task in the past.';
                toast.style.position = 'fixed';
                toast.style.bottom = '20px';
                toast.style.left = '50%';
                toast.style.transform = 'translateX(-50%)';
                toast.style.backgroundColor = 'rgba(220, 53, 69, 0.9)'; // Elegant semi-transparent red
                toast.style.color = 'white';
                toast.style.padding = '10px 20px';
                toast.style.borderRadius = '8px';
                toast.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
                toast.style.zIndex = '9999';
                toast.style.transition = 'opacity 0.3s ease';
                toast.style.fontWeight = '500';
                
                document.body.appendChild(toast);
                
                // Remove after 0.3 seconds (300ms) as requested
                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 300); // Wait for fade out transition
                }, 300);
                
                return;
            }

            document.getElementById('taskDate').value = clickedDate;
            document.getElementById('taskName').value = '';
            document.getElementById('taskDescription').value = '';
            document.getElementById('taskTime').value = '';
            document.getElementById('taskFrequency').value = 'daily';
            
            new bootstrap.Modal(document.getElementById('addTaskModal')).show();
        }
    });
    
    calendar.render();

    // Prevent selecting past dates in the date input just in case
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('taskDate').setAttribute('min', today);
});
</script>
{% endblock %}
